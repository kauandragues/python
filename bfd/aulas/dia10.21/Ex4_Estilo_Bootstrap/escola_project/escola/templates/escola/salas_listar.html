
{% extends 'escola/base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center">
  <h2>Salas</h2>
  <a class="btn btn-primary" href="{% url 'criar_sala' %}">Nova Sala</a>
</div>
<table class="table table-striped mt-3">
  <thead><tr><th>Nome</th><th>Ano</th><th>Ações</th></tr></thead>
  <tbody>
    {% for sala in salas %}
    <tr>
      <td>{{ sala.nome }}</td>
      <td>{{ sala.ano }}</td>
      <td>
        <a class="btn btn-sm btn-secondary" href="{% url 'editar_sala' sala.id %}">Editar</a>
        <form method="post" action="{% url 'deletar_sala' sala.id %}" style="display:inline;">
          {% csrf_token %}
          <button class="btn btn-sm btn-danger" type="submit">Excluir</button>
        </form>
      </td>
    </tr>
    {% empty %}
    <tr><td colspan="3">Nenhuma sala encontrada.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
