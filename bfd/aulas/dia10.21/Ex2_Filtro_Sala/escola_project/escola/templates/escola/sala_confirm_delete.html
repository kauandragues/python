
{% extends 'escola/base.html' %}
{% block content %}
<h2>Confirmar Exclusão</h2>
<p>Tem certeza que deseja excluir a sala <strong>{{ sala }}</strong>?</p>
<form method="post">
  {% csrf_token %}
  <button class="btn btn-danger" type="submit">Sim, excluir</button>
  <a class="btn btn-secondary" href="{% url 'listar_salas' %}">Cancelar</a>
</form>
{% endblock %}
